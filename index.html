<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bool Tok</title>
  <link rel="icon" href="assets/img/booltok_logo.png">


  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">


  <!-- TikTok Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=TikTok+Sans:opsz,wght@12..36,300..900&display=swap"
    rel="stylesheet">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/style.css">

</head>

<body>
  <!-- Container della pagina, necessario per via del layout particolare -->
  <div class="reel-page debug">
    <video src="assets/video/coder.mp4" autoplay muted loop></video>

    <!-- Header -->
    <header class="reel-header">
      <a href="#"><i class="bi bi-play-btn"></i></a>
      <ul>
        <li>Esplora</li>
        <li>Seguiti<span class="puntino"></span></li>
        <li>Per te <span class="foryou"></span> </li>
      </ul>
      <a href="#"><i class="bi bi-search"></i></a>

    </header>

    <!-- Sidebar -->
    <div class="sidebar">
      <div><img src="./assets/img/boolean_logo.png" alt="">
        <span class="iconafollow">
          <i class="bi bi-plus"></i>
        </span>
      </div>

      <div>
        <a class="like" href="#"><i class="bi bi-heart-fill"></i></a>
        <p>588</p>
      </div>
      <div>
        <a href="#"><i class="bi bi-chat-dots-fill"></i></a>
        <p>13</p>
      </div>
      <div>
        <a class="save" href="#"><i class="bi bi-bookmark-fill"></i></a>
        <p>638</p>
      </div>
      <div>
        <a href="#"><i class="bi bi-arrow-up-right-circle-fill"></i></a>
        <p>491</p>
      </div>
    </div>

    <!-- Footer -->
    <footer>
      <div>
        <h2>boolean.carrers</h2>
        <p class="testo">Prova il Fundamentals Campo. 20 ore di corso gratuito per... <span>Vedi altro</span> </p>
      </div>
      <div class="footer-black">
        <div>
          <a href="#"><i class="bi bi-house-fill"></i>
            <p>Home</p>
          </a>
        </div>
        <div>
          <a href="#"><i class="bi bi-people"></i>
            <p>Amici</p>
          </a>
        </div>
        <div class="icona-centrale">
          <a href="#"><i class="bi bi-plus"></i></a>
        </div>
        <div>
          <a href="#"><i class="bi bi-chat-square"></i>
            <p>Posta in arrivo</p>
            <span>19</span>
          </a>
        </div>
        <div>
          <a href="#"><i class="bi bi-person"></i>
            <p>Profilo</p>
          </a>
        </div>
      </div>


    </footer>
  </div>

</body>

</html>
